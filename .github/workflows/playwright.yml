name: 🎭 Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      test_tag:
        description: 'Test tag to run (e.g., @Smoke, @P0, @Regression)'
        required: false
        default: ''

env:
  CI: true
  NODE_VERSION: '20'

jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🎭 Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: 🧪 Run Playwright Tests (Shard ${{ matrix.shard }}/4)
        run: |
          if [ -n "${{ github.event.inputs.test_tag }}" ]; then
            npx playwright test --shard=${{ matrix.shard }}/4 --grep "${{ github.event.inputs.test_tag }}"
          else
            npx playwright test --shard=${{ matrix.shard }}/4
          fi

      - name: 📊 Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: |
            playwright-report/
            test-results/
            tta-report/
          retention-days: 30

      - name: 📸 Upload Screenshots on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots-shard-${{ matrix.shard }}
          path: test-results/**/*.png
          retention-days: 7

  merge-reports:
    name: 📊 Merge Reports
    needs: test
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 📥 Download All Reports
        uses: actions/download-artifact@v4
        with:
          path: all-reports
          pattern: playwright-report-shard-*

      - name: 📊 Merge HTML Reports
        run: npx playwright merge-reports --reporter html ./all-reports

      - name: 📤 Upload Merged Report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-merged
          path: playwright-report/
          retention-days: 30

      - name: 📊 Publish Report Summary
        if: always()
        run: |
          echo "## 🎭 Playwright Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📊 Shards | 4 |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Browser | Chromium |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📁 Download the merged report from the Artifacts section above." >> $GITHUB_STEP_SUMMARY

